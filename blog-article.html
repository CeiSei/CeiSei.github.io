<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 처리 중...</title>
    <script>
        window.onload = function() {
            var queryString = window.location.search; // ?code=...
            
            // 💡 [핵심] 본인 유니티 프로젝트의 정확한 Package Name을 아래에 입력하세요!
            var packageName = "com.UnityTechnologies.com.unity.template.urpblank"; 
            
            // 💡 크롬 공식 권장 방식인 Intent URI로 변환 (mygame:// 대신 intent:// 사용)
            var intentUrl = "intent://auth" + queryString + "#Intent;scheme=mygame;package=" + packageName + ";end;";
            
            // 1. 자동 이동 시도
            window.location.href = intentUrl;
            
            // 2. 수동 버튼에 주소 세팅
            document.getElementById("btn-return").href = intentUrl;
        };
    </script>
</head>
<body style="background-color:#222; color:white; text-align:center; padding-top:20vh; font-family:sans-serif;">
    <h2>✅ 인증이 완료되었습니다!</h2>
    <p>아래 버튼을 눌러 게임으로 돌아가세요.</p>
    
    <a id="btn-return" href="#" style="display:inline-block; padding:15px 30px; background-color:#007BFF; color:white; text-decoration:none; border-radius:10px; margin-top:20px; font-weight:bold; font-size:18px;">
        🎮 게임으로 돌아가기
    </a>
</body>
</html>
