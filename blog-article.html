<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 완료</title>
    <script>
        window.onload = function() {
            var queryString = window.location.search; 
            var packageName = "com.DefaultCompany.MyGame"; // 💡 본인 패키지명 입력
            
            // S.browser_fallback_url=; 를 비워두면 앱이 없을 때 플레이스토어로 튕기는 걸 막습니다.
            var intentUrl = "intent://auth" + queryString + "#Intent;scheme=mygame;package=" + packageName + ";S.browser_fallback_url=;end;";
            
            window.location.href = intentUrl;
            document.getElementById("btn-return").href = intentUrl;
        };
    </script>
</head>
<body style="background-color:#222; color:white; text-align:center; padding-top:20vh; font-family:sans-serif;">
    <h2>✅ 인증이 완료되었습니다</h2>
    <p>아래 버튼을 눌러 게임으로 돌아가세요.</p>
    <a id="btn-return" href="#" style="display:inline-block; padding:15px 30px; background-color:#007BFF; color:white; text-decoration:none; border-radius:10px; margin-top:20px; font-weight:bold; font-size:18px;">
        🎮 게임으로 돌아가기
    </a>
</body>
</html>
