<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 처리 중...</title>
    <script>
        window.onload = function() {
            // 구글이 준 파라미터(?code=...)를 복사
            var queryString = window.location.search;
            // 딥링크 주소 완성
            var deepLinkUrl = "mygame://auth" + queryString;
            
            // 1. 일단 딥링크 자동 호출 (운 좋게 허용해주면 바로 넘어감)
            window.location.href = deepLinkUrl;
            
            // 2. 만약 브라우저가 자동 이동을 차단했다면, 수동 버튼에 주소 세팅
            document.getElementById("btn-return").href = deepLinkUrl;
        };
    </script>
</head>
<body style="background-color:#222; color:white; text-align:center; padding-top:20vh; font-family:sans-serif;">
    <h2>✅ 인증이 완료되었습니다!</h2>
    <p>아래 버튼을 눌러 게임으로 돌아가세요.</p>
    
    <a id="btn-return" href="#" style="display:inline-block; padding:15px 30px; background-color:#007BFF; color:white; text-decoration:none; border-radius:10px; margin-top:20px; font-weight:bold; font-size:18px;">
        🎮 게임으로 돌아가기
    </a>
</body>
</html>
